apostrophes = "it's John's"
local_only = "keep"
model = "managed-model"
profiles = ["managed"]
quoted_text = "say \"hello\""
windows_path = "C:\\Users\\name"

[features]
  [features.multi_agent_v2]
    hide_spawn_agent_metadata = false
    tool_namespace = "agents"

[model_providers]
  [model_providers.genki]
    base_url = "https://codex.test.example/v1"
    experimental_bearer_token = "test-bearer-token"
    name = "Genki"

[nested]
  added = true
  keep = 1
  overwrite = "managed"
